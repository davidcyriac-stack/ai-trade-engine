<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trade Engine Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #666;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .card-content {
            color: #666;
            line-height: 1.6;
        }

        .endpoint {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            color: #333;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .response {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: #333;
            border-left: 4px solid #667eea;
        }

        .error {
            color: #dc2626;
        }

        .success {
            color: #16a34a;
        }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #667eea;
            animation: loading 1.4s infinite;
        }

        @keyframes loading {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 AI Trade Engine</h1>
            <div class="status">
                <span class="status-dot"></span>
                <span id="status-text">Connecting to backend...</span>
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Backend Status</h2>
                <div class="card-content">
                    <button onclick="checkHealth()">Check Health</button>
                    <div id="health-response"></div>
                </div>
            </div>

            <div class="card">
                <h2>API Endpoints</h2>
                <div class="card-content">
                    <div class="endpoint">GET /health</div>
                    <div class="endpoint">GET /api/ai/signals</div>
                    <div class="endpoint">GET /api/dashboard/*</div>
                    <div class="endpoint">GET /api/trades/*</div>
                    <div class="endpoint">GET /api/positions/*</div>
                </div>
            </div>

            <div class="card">
                <h2>AI Signals</h2>
                <div class="card-content">
                    <button onclick="getSignals()">Get Trading Signals</button>
                    <div id="signals-response"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Dashboard Stats</h2>
            <div class="dashboard-grid">
                <div class="stat">
                    <div class="stat-label">Active Models</div>
                    <div class="stat-value" id="model-count">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Pending Signals</div>
                    <div class="stat-value" id="signal-count">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Open Positions</div>
                    <div class="stat-value" id="position-count">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Total Trades</div>
                    <div class="stat-value" id="trade-count">-</div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Developer Console</h2>
            <div class="card-content">
                <label>API URL:</label>
                <input type="text" id="api-url" value="https://ai-trade-engine.vercel.app" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; margin-bottom: 10px;">
                <button onclick="testCustomUrl()">Test Custom URL</button>
                <div id="console-response"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = document.getElementById('api-url').value || 'https://ai-trade-engine.vercel.app';

        async function makeRequest(endpoint) {
            try {
                const url = `${API_BASE}${endpoint}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                throw error;
            }
        }

        async function checkHealth() {
            const responseDiv = document.getElementById('health-response');
            responseDiv.innerHTML = '<div class="loading"></div> Checking...';
            try {
                const data = await makeRequest('/health');
                responseDiv.innerHTML = `<div class="response success">${JSON.stringify(data, null, 2)}</div>`;
                updateStatus(true);
            } catch (error) {
                responseDiv.innerHTML = `<div class="response error">Error: ${error.message}</div>`;
                updateStatus(false);
            }
        }

        async function getSignals() {
            const responseDiv = document.getElementById('signals-response');
            responseDiv.innerHTML = '<div class="loading"></div> Loading signals...';
            try {
                const data = await makeRequest('/api/ai/signals');
                responseDiv.innerHTML = `<div class="response success">${JSON.stringify(data, null, 2)}</div>`;
                if (data.signals) {
                    document.getElementById('signal-count').textContent = data.signals.length;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="response error">Error: ${error.message}</div>`;
            }
        }

        async function testCustomUrl() {
            const url = document.getElementById('api-url').value;
            const responseDiv = document.getElementById('console-response');
            responseDiv.innerHTML = '<div class="loading"></div> Testing...';
            try {
                const response = await fetch(`${url}/health`);
                const data = await response.json();
                responseDiv.innerHTML = `<div class="response success">✓ Connected!\n${JSON.stringify(data, null, 2)}</div>`;
                updateStatus(true);
            } catch (error) {
                responseDiv.innerHTML = `<div class="response error">✗ Connection failed:\n${error.message}</div>`;
                updateStatus(false);
            }
        }

        function updateStatus(isHealthy) {
            const statusText = document.getElementById('status-text');
            const statusDot = document.querySelector('.status-dot');
            if (isHealthy) {
                statusText.textContent = '✓ Backend is online';
                statusDot.style.background = '#4ade80';
            } else {
                statusText.textContent = '✗ Backend is offline';
                statusDot.style.background = '#dc2626';
            }
        }

        // Auto-check health on load
        window.addEventListener('load', () => {
            checkHealth();
        });
    </script>
</body>
</html>
